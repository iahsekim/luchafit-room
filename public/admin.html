<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Review / The Room</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,800&family=Instrument+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F2F1EC; --card:#FFFFFF; --ink:#0C0D0F; --ink-2:#5B5C63;
  --blue:#1E33D9; --blue-deep:#141F86; --tint:#E7EAFA;
  --orange:#FF4B1F; --orange-tint:#FFE7DF; --green:#1B6B4A; --green-tint:#DFF1E8;
  --line:rgba(12,13,15,.13);
  --disp:'Bricolage Grotesque',sans-serif; --body:'Instrument Sans',sans-serif;
  --serif:'Instrument Serif',serif; --mono:'IBM Plex Mono',monospace;
  --r:14px; --ease:cubic-bezier(.22,.8,.24,1);
}
*{margin:0;padding:0;box-sizing:border-box}
::selection{background:var(--blue);color:#fff}
body{font-family:var(--body);background:var(--paper);color:var(--ink);font-size:15px;line-height:1.55;
  -webkit-font-smoothing:antialiased;
  background-image:radial-gradient(rgba(12,13,15,.055) 1px,transparent 1px);background-size:26px 26px}
button,textarea,input{font:inherit;color:inherit}
button{background:none;border:none;cursor:pointer}
button:focus-visible,textarea:focus-visible,input:focus-visible{outline:2px solid var(--blue);outline-offset:3px;border-radius:2px}
em.serif{font-family:var(--serif);font-style:italic;font-weight:400}
.mono{font-family:var(--mono);font-size:11.5px;letter-spacing:.04em;color:var(--ink-2)}
.wrap{max-width:1100px;margin:0 auto;padding:0 clamp(16px,3vw,28px)}
.hidden{display:none!important}
.pill{font-family:var(--mono);font-size:11.5px;border:1.5px solid var(--line);border-radius:999px;
  padding:9px 16px;background:var(--card);transition:all .2s;white-space:nowrap}
.pill:hover{border-color:var(--ink)}
.pill.on{background:var(--ink);border-color:var(--ink);color:var(--paper)}
.pill.solid{background:var(--blue);border-color:var(--blue);color:#fff}
.pill.solid:hover{background:var(--ink);border-color:var(--ink)}
.pill.ok{border-color:var(--green);color:var(--green)}
.pill.ok:hover{background:var(--green);color:#fff}
.pill.no{border-color:var(--orange);color:var(--orange)}
.pill.no:hover{background:var(--orange);color:#fff}
.pill.sm{padding:8px 14px;font-size:11px}

/* gate */
#gate{max-width:420px;margin:13vh auto;padding:0 22px}
#gate .wordmark{font-family:var(--disp);font-weight:800;font-size:20px;letter-spacing:-.02em;
  display:flex;align-items:baseline;gap:7px;margin-bottom:26px}
#gate .wordmark sup{font-family:var(--mono);font-size:9px;color:var(--orange);letter-spacing:.1em;font-weight:400}
#gate h1{font-family:var(--disp);font-weight:800;font-size:44px;letter-spacing:-.03em;line-height:.98}
#gate h1 em.serif{color:var(--blue)}
#gate p{color:var(--ink-2);font-size:14px;margin:12px 0 24px}
#gate input{width:100%;font-family:var(--mono);font-size:14px;padding:14px 15px;
  border:1.5px solid var(--line);border-radius:10px;background:var(--card)}
#gate input:focus{border-color:var(--blue);outline:none}
#gate button{width:100%;margin-top:10px;padding:14px;border-radius:999px}
#gateErr{color:var(--orange);font-size:13.5px;margin-top:12px}

/* header */

/* logo */
.brand{display:flex;align-items:center;gap:11px;min-width:0}
.logo{height:26px;width:auto;display:block;flex:0 0 auto}
.logo .lf-mark{fill:var(--orange)}
.logo .lf-word{fill:var(--ink)}
.brand sup{font-family:var(--mono);font-size:9px;color:var(--ink-2);
  letter-spacing:.13em;font-weight:400;white-space:nowrap;top:-.15em}
header{position:sticky;top:0;z-index:100;background:rgba(242,241,236,.93);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;justify-content:space-between;min-height:68px;
  padding:14px 0;gap:18px;flex-wrap:wrap}
.wordmark{font-family:var(--disp);font-weight:800;font-size:19px;letter-spacing:-.02em;
  display:flex;align-items:baseline;gap:7px}
.wordmark sup{font-family:var(--mono);font-size:9px;color:var(--orange);letter-spacing:.1em;font-weight:400}
.stats{display:flex;gap:5px;flex-wrap:wrap}
.stat{background:var(--card);border:1px solid var(--line);border-radius:10px;
  padding:7px 13px;text-align:center;min-width:52px}
.stat b{display:block;font-family:var(--disp);font-weight:800;font-size:17px;line-height:1.25;letter-spacing:-.02em}
.stat span{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--ink-2)}
.stat.hot{background:var(--orange);border-color:var(--orange)}
.stat.hot b{color:#fff} .stat.hot span{color:rgba(255,255,255,.8)}

main{padding:30px 0 110px}
.bar{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:22px}
.seg{display:flex;gap:5px} .grow{flex:1}

/* seed */
.seed{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:28px;margin-bottom:22px}
.seed h3{font-family:var(--disp);font-weight:600;font-size:21px;letter-spacing:-.02em}
.seed p.hint{font-size:13.5px;color:var(--ink-2);margin:4px 0 14px}
.seed textarea{width:100%;min-height:150px;border:1.5px solid var(--line);border-radius:10px;
  padding:12px 14px;background:var(--paper);resize:vertical;line-height:1.5}
.seed textarea:focus{border-color:var(--blue);background:var(--card);outline:none}
.seed .foot{display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap}
.seed select{font-family:var(--mono);font-size:11.5px;padding:8px 12px;border:1.5px solid var(--line);
  border-radius:999px;background:var(--card)}
.seed .n{font-family:var(--mono);font-size:11px;color:var(--ink-2);flex:1}
.seed .msg{font-family:var(--mono);font-size:11.5px;margin-top:12px}

/* rows */
.row{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px;
  margin-bottom:10px;display:flex;gap:20px;align-items:flex-start;transition:border-color .2s,box-shadow .2s}
.row.focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(30,51,217,.12)}
.row.prio{border-color:var(--orange);background:linear-gradient(0deg,var(--orange-tint),var(--orange-tint)) padding-box}
.row.prio.focus{box-shadow:0 0 0 3px rgba(255,75,31,.18)}
.meta{flex:0 0 96px;display:flex;flex-direction:column;gap:6px;padding-top:2px}
.meta .mono{font-size:10.5px;line-height:1.45}
.tag{font-family:var(--mono);font-size:9.5px;letter-spacing:.09em;text-transform:uppercase;
  border-radius:999px;padding:4px 9px;background:var(--tint);color:var(--blue-deep);align-self:flex-start}
.tag.read{background:var(--orange);color:#fff}
.tag.seed{background:var(--paper);color:var(--ink-2);border:1px solid var(--line)}
.tag.edit{background:var(--green-tint);color:var(--green)}
.txt{flex:1;min-width:0}
.txt p{overflow-wrap:break-word;white-space:pre-wrap;font-size:15.5px;line-height:1.6}
.txt textarea{width:100%;min-height:96px;border:1.5px solid var(--blue);border-radius:9px;
  padding:10px 12px;background:var(--paper);resize:vertical;line-height:1.55;font-size:14.5px}
.txt textarea:focus{outline:none;background:var(--card)}
.orig{font-family:var(--mono);font-size:10px;color:rgba(12,13,15,.42);margin-top:7px;
  border-left:2px solid var(--line);padding-left:9px;white-space:pre-wrap}
.acts{flex:0 0 auto;display:flex;gap:7px;flex-wrap:wrap;align-items:flex-start}

.empty{text-align:center;padding:64px 0;font-family:var(--mono);font-size:12px;color:rgba(12,13,15,.35);
  border:1px dashed var(--line);border-radius:12px}
.keys{position:fixed;bottom:0;left:0;right:0;background:var(--ink);color:var(--paper);
  font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;padding:13px 20px;text-align:center;z-index:90}
.keys b{color:var(--orange);font-weight:500}
@media(max-width:720px){
  .row{flex-wrap:wrap} .meta{flex-basis:100%;flex-direction:row;align-items:center}
  .acts{width:100%} .keys{display:none}
}
</style>
</head>

      <div class="stats" id="stats"></div>
    </div>
  </header>

  <main class="wrap">
    <div class="bar">
      <div class="seg" id="days"></div>
      <div class="seg" id="tabs"></div>
      <span class="grow"></span>
      <button class="pill ok hidden" id="bulk"></button>
      <button class="pill" id="seedToggle">Add entries</button>
    </div>

    <div class="seed hidden" id="seedPanel">
      <h3>Add entries by hand</h3>
      <p class="hint">One entry per line. Blank lines ignored. Anything under 8 characters is skipped.</p>
      <textarea id="seedText" placeholder="My standard this season is showing up first and leaving last.
My standard this season is winning the third period.
My standard this season is never getting outworked in my own room."></textarea>
      <div class="foot">
        <select id="seedDay">
          <option value="1">Day 1</option><option value="2">Day 2</option>
          <option value="3">Day 3</option><option value="4">Day 4</option><option value="5">Day 5</option>
        </select>
        <span class="n" id="seedCount">0 lines</span>
        <button class="pill" id="seedQueue">Add to queue</button>
        <button class="pill solid" id="seedWall">Post straight to wall</button>
      </div>
      <div class="msg hidden" id="seedMsg"></div>
    </div>

    <div id="rows"><div class="empty">Loading</div></div>
  </main>
</div>

<div class="keys hidden" id="keys">
  <b>J</b>/<b>K</b> move &nbsp;·&nbsp; <b>A</b> approve &nbsp;·&nbsp; <b>R</b> reject &nbsp;·&nbsp;
  <b>E</b> edit &nbsp;·&nbsp; <b>⌘↵</b> save and approve &nbsp;·&nbsp; <b>Esc</b> cancel
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let KEY = sessionStorage.getItem('room.key') || '';
let rows = [], focus = 0, status = 'pending', day = 0, editing = null;

async function api(payload){
  const r = await fetch('/.netlify/functions/admin', {
    method:'POST', headers:{'Content-Type':'application/json','x-admin-key':KEY},
    body: JSON.stringify(payload)
  });
  const j = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(j.message || ('Request failed (' + r.status + ')'));
  return j;
}

$('enter').addEventListener('click', tryKey);
$('key').addEventListener('keydown', e => { if (e.key === 'Enter') tryKey(); });
async function tryKey(){
  KEY = $('key').value.trim(); if (!KEY) return;
  try { await api({action:'stats'}); sessionStorage.setItem('room.key', KEY); boot(); }
  catch(e){ $('gateErr').textContent = e.message; $('gateErr').classList.remove('hidden'); }
}
if (KEY) api({action:'stats'}).then(r => r.ok && boot()).catch(()=>{});

function boot(){
  $('gate').classList.add('hidden');
  $('app').classList.remove('hidden');
  $('keys').classList.remove('hidden');
  $('days').innerHTML = ['All',1,2,3,4,5].map((d,i) => {
    const v = i===0 ? 0 : d;
    return `<button class="pill ${v===day?'on':''}" data-day="${v}">${i===0?'All':'D'+d}</button>`;
  }).join('');
  $('tabs').innerHTML = ['pending','approved','rejected'].map(sv =>
    `<button class="pill ${sv===status?'on':''}" data-status="${sv}">${sv}</button>`).join('');
  $('days').onclick = e => { const b=e.target.closest('button'); if(b){ day=+b.dataset.day; boot(); } };
  $('tabs').onclick = e => { const b=e.target.closest('button'); if(b){ status=b.dataset.status; boot(); } };
  loadStats(); load();
}

async function loadStats(){
  try{
    const r = await api({action:'stats'});
    const s = r.stats; let h = '';
    for (let d=1; d<=5; d++) h += `<div class="stat"><b>${s.pending[d]}</b><span>DAY ${d}</span></div>`;
    if (s.priority) h += `<div class="stat hot"><b>${s.priority}</b><span>READ FIRST</span></div>`;
    $('stats').innerHTML = h;
  }catch(e){}
}

async function load(){
  $('rows').innerHTML = '<div class="empty">Loading</div>';
  try{
    const r = await api({action:'list', status, day});
    rows = r.rows || []; focus = 0; editing = null; render();
  }catch(e){ $('rows').innerHTML = `<div class="empty">${esc(e.message)}</div>`; }
}

function render(){
  if (!rows.length){
    $('rows').innerHTML = `<div class="empty">Nothing ${status}</div>`;
    $('bulk').classList.add('hidden'); return;
  }
  if (status === 'pending'){ $('bulk').textContent = 'Approve all ' + rows.length; $('bulk').classList.remove('hidden'); }
  else $('bulk').classList.add('hidden');

  $('rows').innerHTML = rows.map((e,i) => {
    const when = new Date(e.created_at).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
    const tags = [
      e.priority ? '<span class="tag read">Read first</span>' : '',
      e.edited_at ? '<span class="tag edit">Edited</span>' : '',
      e.seed ? '<span class="tag seed">Seed</span>' : ''
    ].join('');
    const body = editing === e.id
      ? `<textarea id="ed">${esc(e.text)}</textarea>`
      : `<p>${esc(e.text)}</p>` + (e.original ? `<div class="orig">they wrote: ${esc(e.original)}</div>` : '');
    const acts = status === 'pending'
      ? `<button class="pill ok sm" data-do="approve" data-i="${i}">Approve</button>
         <button class="pill sm" data-do="edit" data-i="${i}">Edit</button>
         <button class="pill no sm" data-do="reject" data-i="${i}">Reject</button>`
      : `<button class="pill sm" data-do="edit" data-i="${i}">Edit</button>
         <button class="pill sm" data-do="unpost" data-i="${i}">Back to queue</button>`;
    return `<div class="row ${i===focus?'focus':''} ${e.priority?'prio':''}" data-i="${i}">
      <div class="meta"><span class="mono">D${e.day} · ${when}</span>${tags}</div>
      <div class="txt">${body}</div>
      <div class="acts">${acts}</div>
    </div>`;
  }).join('');

  const ed = $('ed');
  if (ed){ ed.focus(); ed.setSelectionRange(ed.value.length, ed.value.length); }
  else document.querySelector('.row.focus')?.scrollIntoView({block:'nearest'});
}

$('rows').addEventListener('click', e => {
  const b = e.target.closest('button[data-do]');
  if (b){ focus = +b.dataset.i; return act(b.dataset.do); }
  const row = e.target.closest('.row');
  if (row && !editing){ focus = +row.dataset.i; render(); }
});

async function act(what){
  const e = rows[focus]; if (!e) return;
  if (what === 'edit'){ editing = editing === e.id ? null : e.id; return render(); }
  try{
    if (editing === e.id){
      const text = $('ed').value.trim();
      await api({action:'edit', id:e.id, text, approve: what === 'approve'});
      if (what !== 'approve'){ e.text = text; editing = null; return render(); }
    } else {
      await api({action:what, ids:[e.id]});
    }
    rows.splice(focus,1);
    if (focus >= rows.length) focus = Math.max(0, rows.length-1);
    editing = null; render(); loadStats();
  }catch(err){ alert(err.message); }
}

$('bulk').addEventListener('click', async () => {
  if (!confirm('Approve all ' + rows.length + ' and put them on the wall?')) return;
  try{ await api({action:'approve', ids: rows.map(r => r.id)}); load(); loadStats(); }
  catch(e){ alert(e.message); }
});

// ---- seeding ----
const seedLines = () => $('seedText').value.split('\n')
  .map(l => l.trim().replace(/\s+/g,' ')).filter(l => l.length >= 8 && l.length <= 400);
$('seedToggle').addEventListener('click', () => {
  const p = $('seedPanel'); p.classList.toggle('hidden');
  if (!p.classList.contains('hidden')){ $('seedDay').value = day || 1; $('seedText').focus(); }
});
$('seedText').addEventListener('input', () => {
  const n = seedLines().length;
  $('seedCount').textContent = n + (n === 1 ? ' usable line' : ' usable lines');
});
async function seed(approve){
  const texts = seedLines(), msg = $('seedMsg');
  msg.classList.remove('hidden');
  if (!texts.length){ msg.style.color='var(--orange)'; msg.textContent='Nothing usable to add.'; return; }
  msg.style.color='var(--ink-2)'; msg.textContent='Adding ' + texts.length + '...';
  try{
    const r = await api({action:'seed', day:+$('seedDay').value, texts, approve});
    if (!r.ok) throw new Error(r.message || 'Could not add those');
    msg.style.color='var(--green)';
    msg.textContent = 'Added ' + r.added + (approve ? ' straight to the wall.' : ' to the queue.');
    $('seedText').value=''; $('seedCount').textContent='0 lines';
    load(); loadStats();
  }catch(e){ msg.style.color='var(--orange)'; msg.textContent = e.message; }
}
$('seedQueue').addEventListener('click', () => seed(false));
$('seedWall').addEventListener('click', () => seed(true));

document.addEventListener('keydown', e => {
  if ($('app').classList.contains('hidden')) return;
  if (editing){
    if (e.key === 'Escape'){ editing = null; render(); }
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)){ e.preventDefault(); act('approve'); }
    return;
  }
  if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
  const k = e.key.toLowerCase();
  if (k === 'j'){ focus = Math.min(rows.length-1, focus+1); render(); }
  if (k === 'k'){ focus = Math.max(0, focus-1); render(); }
  if (k === 'a' && status === 'pending') act('approve');
  if (k === 'r' && status === 'pending') act('reject');
  if (k === 'e') act('edit');
});
</script>
</body>
</html>
